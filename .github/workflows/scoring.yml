name: OSCamp Autograding

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  TZ: Asia/Shanghai

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest

    container:
      image: rust:latest

    env:
      OUTPUT: .github/result/check_result.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          apt-get update
          apt-get install -y jq gcc-riscv64-linux-gnu qemu-user-static

      - name: Set up riscv64 target
        run: rustup target add riscv64gc-unknown-linux-gnu

      - name: Run scoring
        shell: bash
        run: |
          RISCV64_TARGET="riscv64gc-unknown-linux-gnu"
          RISCV64_SYSROOT="${RISCV64_SYSROOT:-/usr/riscv64-linux-gnu}"
          export CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_RUNNER="qemu-riscv64 -L $RISCV64_SYSROOT"

          TOTAL_SCORE=0
          PASS=0
          FAIL=0
          RESULTS="[]"

          run_test() {
            local pkg="$1"
            local target="$2"

            if [ "$target" = "riscv64" ]; then
              cargo test -p "$pkg" \
                --target "$RISCV64_TARGET" \
                --quiet
            else
              cargo test -p "$pkg" --quiet
            fi
          }

          check() {
            local pkg="$1"
            local score="$2"
            local target="${3:-default}"

            printf "  %-25s [%2d pts]  " "$pkg" "$score"

            if run_test "$pkg" "$target"; then
              echo "PASS (+$score)"
              TOTAL_SCORE=$((TOTAL_SCORE + score))
              PASS=$((PASS + 1))

              RESULTS=$(echo "$RESULTS" | jq \
                --arg package "$pkg" \
                --argjson max_score "$score" \
                '. + [{
                  "package": $package,
                  "score": $max_score,
                  "max": $max_score,
                  "status": "pass"
                }]')
            else
              echo "FAIL"
              FAIL=$((FAIL + 1))

              RESULTS=$(echo "$RESULTS" | jq \
                --arg package "$pkg" \
                --argjson max_score "$score" \
                '. + [{
                  "package": $package,
                  "score": 0,
                  "max": $max_score,
                  "status": "fail"
                }]')
            fi
          }

          echo "========================================="
          echo "       OSCamp Exercise Scoring"
          echo "========================================="

          # Module 1: Concurrency — 15 points
          check thread_spawn         3
          check mutex_counter        4
          check channel              4
          check process_pipe         4

          # Module 2: no_std — 24 points
          check mem_primitives       4
          check bump_allocator       5
          check free_list_allocator  5
          check syscall_wrapper      5
          check fd_table             5

          # Module 3: OS Concurrency — 21 points
          check atomic_counter       4
          check atomic_ordering      4
          check spinlock             4
          check spinlock_guard       4
          check rwlock               5

          # Module 4: Context Switch — 12 points
          check stack_coroutine      6 riscv64
          check green_threads        6 riscv64

          # Module 5: Async — 14 points
          check basic_future         4
          check tokio_tasks          3
          check async_channel_ex     3
          check select_timeout       4

          # Module 6: Page Tables — 14 points
          check pte_flags            3
          check page_table_walk      4
          check multi_level_pt       4
          check tlb_sim              3

          TOTAL=$((PASS + FAIL))

          echo "========================================="
          echo "  Passed: $PASS"
          echo "  Failed: $FAIL"
          echo "  Total:  $TOTAL"
          echo "  Score:  $TOTAL_SCORE / 100"
          echo "========================================="

          mkdir -p .github/result

          echo "$RESULTS" | jq \
            --argjson total "$TOTAL" \
            --argjson passed "$PASS" \
            --argjson failed "$FAIL" \
            --argjson score "$TOTAL_SCORE" \
            '{
              exercises: [
                .[] | {
                  name: .package,
                  score: .score,
                  max_score: .max,
                  result: (.status == "pass")
                }
              ],
              statistics: {
                total_exercises: $total,
                total_succeeds: $passed,
                total_failures: $failed,
                total_score: $score,
                total_possible: 100
              }
            }' > "$OUTPUT"

          {
            echo "# OSCamp 自动评分"
            echo
            echo "| 项目 | 结果 |"
            echo "|---|---:|"
            echo "| 通过实验 | $PASS / $TOTAL |"
            echo "| 失败实验 | $FAIL |"
            echo "| 最终成绩 | **$TOTAL_SCORE / 100** |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload grading result
        uses: actions/upload-artifact@v4
        with:
          name: grading-result
          path: .github/result/check_result.json
          retention-days: 30
